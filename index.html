<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdefdf" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0d0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Every Play! Pokémon major — Regionals, Special Events, Internationals, Worlds — on one map. Pin your home, count down, plan your season."
    />
    <!-- Social unfurls: shared plan links live in Discord/WhatsApp/Slack -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GeorgiaPlayEvents" />
    <meta property="og:title" content="Map of Pokémon Championships" />
    <meta
      property="og:description"
      content="Every Play! Pokémon major — Regionals, Special Events, Internationals, Worlds — on one map. Pin your home, count down, plan your season."
    />
    <meta property="og:url" content="https://pizzacatz.github.io/pokemon-majors-map/" />
    <meta property="og:image" content="https://pizzacatz.github.io/pokemon-majors-map/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Resolve the theme before first paint: saved choice wins, else system.
      ;(function () {
        var t = localStorage.getItem('pmm.theme')
        document.documentElement.dataset.theme =
          t === 'light' || t === 'dark'
            ? t
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
      })()
    </script>
    <title>Map of Pokémon Championships</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
