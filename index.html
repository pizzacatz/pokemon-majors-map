<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e3350d" />
    <meta
      name="description"
      content="Every Play! Pokémon major — Regionals, Special Events, Internationals, Worlds — on one map. Pin your home, count down, plan your season."
    />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      // Resolve the theme before first paint: saved choice wins, else system.
      ;(function () {
        var t = localStorage.getItem('pmm.theme')
        document.documentElement.dataset.theme =
          t === 'light' || t === 'dark'
            ? t
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
      })()
    </script>
    <title>Pokémon Majors Map</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
