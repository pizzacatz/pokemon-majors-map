name: Refresh event data

on:
  schedule:
    # Daily, off the top of the hour to be polite to the sources.
    - cron: '17 9 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/scrape.yml'
      - 'scraper/**'

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # playwright-core drives the runner's preinstalled Chrome to read the
      # JS-rendered official championships site.
      - run: npm ci

      - name: Run scraper
        id: scrape
        run: node scraper/scrape.mjs
        continue-on-error: true

      # Fail-safe (PRD §5.3): a failed scrape never publishes — the last good
      # events.json stays live and we file/refresh an issue instead.
      - name: File issue on failure
        if: steps.scrape.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Scraper failed — event data is stale'
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: 'scraper',
            })
            const body = `The daily scrape failed on ${new Date().toISOString()}.\n\n` +
              `See the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}). ` +
              `The site keeps serving the last good data until this is fixed.`
            const existing = issues.find(i => i.title === title)
            if (existing) {
              await github.rest.issues.createComment({ ...context.repo, issue_number: existing.number, body })
            } else {
              await github.rest.issues.create({ ...context.repo, title, body, labels: ['scraper'] })
            }
            core.setFailed('Scraper failed; issue filed.')

      - name: Commit refreshed data
        id: commit
        if: steps.scrape.outcome == 'success'
        run: |
          if git diff --quiet -- public/data/events.json scraper/geocache.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes."
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git add public/data/events.json scraper/geocache.json
            git commit -m "data: refresh events ($(date -u +%F))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Commits made with GITHUB_TOKEN don't trigger the deploy workflow,
      # so kick it explicitly when data changed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "${GITHUB_REF_NAME}"
